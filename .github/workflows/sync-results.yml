name: Sync Results

on:
  schedule:
    # A cada minuto durante a Copa (Jun–Jul 2026)
    # A rota retorna imediatamente se não há jogo ao vivo ou prestes a começar,
    # e só faz request à football-data.org quando necessário (10 req/min no plano gratuito)
    - cron: "* * * 6,7 *"
  workflow_dispatch:

jobs:
  sync-results:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-results endpoint
        run: |
          curl -s -f \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync-results" \
            | tee /tmp/response.json
          cat /tmp/response.json
